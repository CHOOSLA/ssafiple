[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Vue SPA 새로고침 시 404 에러 방지 (모든 라우트를 index.html로 리다이렉트)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 서비스워커는 캐시하지 않음 — 새 버전 배포 시 즉시 갱신 보장
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
