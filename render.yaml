services:
  - type: web
    name: ssafiple-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CORS_ORIGINS
        value: "*" # 추후 Netlify 배포 도메인으로 제한 권장
      - key: OPENAI_API_KEY
        sync: false # Render 웹 콘솔 Environment 탭에서 직접 입력
