services:
  - type: web
    name: ssafiple-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CORS_ORIGINS
        value: "https://ssafiple.netlify.app" # 배포된 Netlify 프론트엔드 도메인으로 명시적 제한 (allow_credentials=True 와 충돌 방지)
      - key: OPENAI_API_KEY
        sync: false # Render 웹 콘솔 Environment 탭에서 직접 입력
